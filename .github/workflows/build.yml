name: "Build and Cache Outputs"
on:
  pull_request:
  push:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Nix
      uses: cachix/install-nix-action@v31.10.1
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
          extra-platforms = aarch64-linux
    - name: Set up QEMU ARM64
      uses: docker/setup-qemu-action@v4.0.0
      with:
        platforms: arm64
    - name: Restore and save Nix Store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 1G
    - name: Setup Nix binary cache
      run: |
        CONFIG_PATH=$(nix build .#nixConfigFragment --print-out-paths)

        cat "$CONFIG_PATH" | sudo tee -a /etc/nix/nix.conf

        sudo systemctl restart nix-daemon
    - name: Build desktop Nix config
      run: |
        nix build \
          .#nixosConfigurations.peter-pc.config.system.build.toplevel \
          --out-link result-nixos
    - name: Build nix-on-droid config
      run: |
        nix build \
          .#nixOnDroidConfigurations.a15.activationPackage \
          --out-link result-nod
    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ secrets.NIX_SSH_PRIVATE_KEY }}
    - name: Copy Nix paths to remote server
      run: |
        echo "${{ secrets.NIX_SIGNING_KEY }}" > cache-priv-key.pem
        chmod 600 cache-priv-key.pem
        nix store sign -k cache-priv-key.pem ./result*
        nix copy --substitute-on-destination --to "${{ vars.NIX_REMOTE_HOST }}" ./result*
      if: |
        vars.NIX_REMOTE_HOST != '' &&
        secrets.NIX_SIGNING_KEY != '' &&
        secrets.NIX_SSH_PRIVATE_KEY != ''
